<main class="page">
  <div class="page__inner">
    <h1 class="page__title">Impressum</h1>
    <p><strong>{{ site.name }}</strong><br />{{ site.address }}</p>
    <p>
      Telefon: <a [href]="'tel:' + site.phone">{{ site.phone }}</a><br />
      E-Mail: <a [href]="'mailto:' + site.email">{{ site.email }}</a>
    </p>
    <p class="page__note">
      Angaben gemäß § 5 TMG. Verantwortlich für den Inhalt: OZ Haustechnik.
    </p>
  </div>
</main>
