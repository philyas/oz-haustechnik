<section class="hero" aria-labelledby="hero-heading">
  <div class="hero__bg" role="presentation">
    <video
      class="hero__video"
      [src]="heroVideoUrl"
      autoplay
      muted
      loop
      playsinline
      preload="auto"
      aria-hidden="true"
    ></video>
    <span class="hero__overlay"></span>
  </div>
  <div class="hero__content">
    <h1 id="hero-heading" class="hero__title">OZ Haustechnik</h1>
    <p class="hero__tagline">{{ tagline }}</p>
    <p class="hero__intro">
      Ob Reparaturen, Wartung oder die Installation neuer Systeme – wir sind für Sie da.
    </p>
    <div class="hero__actions">
      <a href="mailto:info@oz-haustechnik.de" class="hero__btn hero__btn--primary">
        <span class="hero__btn-text">Kontakt aufnehmen</span>
      </a>
      <a href="tel:015111519151" class="hero__btn hero__btn--secondary">
        <span class="hero__btn-text">0151-11519151</span>
      </a>
    </div>
  </div>
</section>
