<footer class="footer">
  <div class="footer__inner">
    <div class="footer__grid">
      <div class="footer__brand">
        <img
          [src]="site.logoPath"
          [alt]="site.name"
          class="footer__logo-img"
          width="200"
          height="70"
        />
        <p class="footer__tagline">{{ site.tagline }}</p>
        <p class="footer__services">{{ site.servicesTagline }}</p>
      </div>
      <div class="footer__contact">
        <h3 class="footer__heading">Kontakt</h3>
        <p class="footer__address">{{ site.address }}</p>
        <a [href]="'tel:' + site.phone" class="footer__link">{{ site.phone }}</a>
        <a [href]="'mailto:' + site.email" class="footer__link">{{ site.email }}</a>
        <p class="footer__hours">{{ site.hours }}</p>
      </div>
      <div class="footer__legal">
        <h3 class="footer__heading">Rechtliches</h3>
        <a [routerLink]="routes.imprint" class="footer__link">Impressum</a>
        <a [routerLink]="routes.privacy" class="footer__link">Datenschutz</a>
      </div>
    </div>
    <div class="footer__bottom">
      <p class="footer__copy">© {{ currentYear }} {{ site.name }}</p>
    </div>
  </div>
</footer>
